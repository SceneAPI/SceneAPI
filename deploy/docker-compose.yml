# sceneapi deploy: web + redis + postgres.
#
# The GPU **worker** is intentionally NOT here — on Windows + CUDA we
# run it as an nssm-wrapped service against the host's existing CUDA
# stack and pinned `pycolmap` wheel (see deploy/install-worker.ps1).
# The worker connects to the same redis + postgres exposed below.
#
# On Linux hosts you can add a `worker` service with
#   `runtime: nvidia` and `deploy.resources.reservations.devices: [...]`
# but that's left to operator preference.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SCENEAPI_PG_USER:-sfm}
      POSTGRES_PASSWORD: ${SCENEAPI_PG_PASS:-sfm}
      POSTGRES_DB: ${SCENEAPI_PG_DB:-sfmapi}
    ports:
      - "${SCENEAPI_PG_PORT:-5432}:5432"
    volumes:
      - sfmapi_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SCENEAPI_PG_USER:-sfm} -d ${SCENEAPI_PG_DB:-sfmapi}"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${SCENEAPI_REDIS_PORT:-6379}:6379"
    volumes:
      - sfmapi_redis:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SCENEAPI_ENV: prod
      SCENEAPI_DB_URL: "postgresql+psycopg://${SCENEAPI_PG_USER:-sfm}:${SCENEAPI_PG_PASS:-sfm}@postgres:5432/${SCENEAPI_PG_DB:-sfmapi}"
      SCENEAPI_REDIS_URL: "redis://redis:6379/0"
      SCENEAPI_WORKSPACE_ROOT: /workspaces
      SCENEAPI_BLOB_ROOT: /workspaces/_blobs
      SCENEAPI_S3_CACHE_ROOT: /workspaces/_cache/s3
      SCENEAPI_AUTH_MODE: ${SCENEAPI_AUTH_MODE:-api_key}
      SCENEAPI_PYCOLMAP_AVAILABLE: "false"  # web never imports pycolmap
      SCENEAPI_LOG_LEVEL: INFO
      SCENEAPI_INLINE_TASKS: "false"
    ports:
      - "${SCENEAPI_WEB_PORT:-8080}:8080"
    volumes:
      - sfmapi_workspaces:/workspaces

volumes:
  sfmapi_pg:
  sfmapi_redis:
  sfmapi_workspaces:
