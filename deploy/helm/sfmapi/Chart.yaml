apiVersion: v2
name: sfmapi
description: |
  sfmapi: a generic HTTP/REST API for Structure-from-Motion tasks,
  plus image segmentation. This chart deploys the web tier + an
  optional in-cluster worker DaemonSet that lands on GPU-capable
  nodes (the worker image bundles the SfM backend of the operator's
  choice). Postgres and Redis are pulled in as subcharts; both can
  be disabled if you front the install with managed services.
type: application
version: 0.0.1
appVersion: "0.0.1"
keywords:
  - sfm
  - structure-from-motion
  - photogrammetry
  - rest-api
home: https://sfmapi.github.io
sources:
  - https://github.com/sfmapi/sfmapi
maintainers:
  - name: opsiclear
    url: https://github.com/opsiclear

dependencies:
  - name: postgresql
    version: ">=16.0.0 <17.0.0"
    # Bitnami charts moved to OCI distribution; the legacy HTTPS URL
    # still serves index.yaml but Helm 3.16+ doesn't drop the
    # resulting tarballs into charts/ when fetched via the implicit
    # OCI redirect — addressing the OCI registry directly works
    # cleanly under both `helm dependency update` and `build`.
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: postgresql.enabled
  - name: redis
    version: ">=20.0.0 <22.0.0"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: redis.enabled
