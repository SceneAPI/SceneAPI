apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sfmapi.fullname" . }}-web
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sfmapi.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  {{- if not .Values.web.autoscaling.enabled }}
  replicas: {{ .Values.web.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "sfmapi.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "sfmapi.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
        {{- with .Values.web.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.web.podAnnotations }}
      annotations: {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "sfmapi.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.podSecurityContext }}
      securityContext: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web
          image: {{ include "sfmapi.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.web.containerSecurityContext }}
          securityContext: {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
          env:
            {{- include "sfmapi.commonEnv" . | nindent 12 }}
            - name: SFMAPI_PYCOLMAP_AVAILABLE
              value: "false"
          {{- if .Values.env.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.env.existingSecret | quote }}
          {{- end }}
          {{- with .Values.web.livenessProbe }}
          livenessProbe: {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.web.readinessProbe }}
          readinessProbe: {{- toYaml . | nindent 12 }}
          {{- end }}
          resources: {{- toYaml .Values.web.resources | nindent 12 }}
          volumeMounts:
            - name: workspaces
              mountPath: /workspaces
      volumes:
        - name: workspaces
          {{- if .Values.workspace.persistentVolumeClaim.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "sfmapi.fullname" . }}-workspaces
          {{- else if .Values.workspace.hostPath }}
          hostPath:
            path: {{ .Values.workspace.hostPath | quote }}
            type: DirectoryOrCreate
          {{- else }}
          emptyDir: {}
          {{- end }}
