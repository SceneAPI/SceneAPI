name: Hub Install

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: read

concurrency:
  group: hub-install-${{ github.ref }}
  cancel-in-progress: true

env:
  HUB_INSTALL_TOKEN: ${{ secrets.SFMAPI_HUB_INSTALL_TOKEN }}

jobs:
  install-registry:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/checkout@v7
        with:
          repository: SceneAPI/SceneIO
          path: .cache/SceneIO
      - name: Link the sceneio contract plane to the sibling path uv.sources expects
        run: ln -s "$GITHUB_WORKSPACE/.cache/SceneIO" "$GITHUB_WORKSPACE/../SceneIO"
      - uses: astral-sh/setup-uv@v7
      - name: Install sfmapi
        run: |
          uv sync --extra dev --extra mcp
      - name: Configure private GitHub plugin access
        if: env.HUB_INSTALL_TOKEN != ''
        run: |
          git config --global url."https://x-access-token:${HUB_INSTALL_TOKEN}@github.com/".insteadOf "https://github.com/"
      - name: Report manifest-only fallback
        if: env.HUB_INSTALL_TOKEN == ''
        run: |
          echo "::notice::SFMAPI_HUB_INSTALL_TOKEN is not configured; validating bundled plugin manifests only. Add a fine-grained token with read access to official plugin repos to enable full install checks."
      - name: Install every GitHub plugin entry
        if: env.HUB_INSTALL_TOKEN != ''
        run: |
          uv run python - <<'PY'
          import subprocess
          import sys

          from sfm_hub.registry import list_manifests

          for manifest in list_manifests():
              uv_runtime = manifest.runtime_modes.uv
              if uv_runtime is None:
                  print(f"skip {manifest.plugin_id}: no uv runtime")
                  continue
              ref = uv_runtime.ref or "main"
              spec = f"{uv_runtime.package} @ git+{uv_runtime.url}@{ref}"
              print(f"install {manifest.plugin_id}: {spec}")
              subprocess.run(
                  ["uv", "pip", "install", spec, "--no-deps"],
                  check=True,
                  stdout=sys.stdout,
                  stderr=sys.stderr,
              )
          PY
      - name: Validate installed entry points
        if: env.HUB_INSTALL_TOKEN != ''
        run: uv run python -m bench.cli plugins --require-entry-points
      - name: Validate bundled manifests
        if: env.HUB_INSTALL_TOKEN == ''
        run: uv run python -m bench.cli plugins
