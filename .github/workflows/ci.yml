name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}  # enables the manual-only real-engine job below

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SFMAPI_SDK_REPO: ${{ github.workspace }}/.cache/sfmapi-sdk

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: SFMAPI/sfmapi-sdk
          path: .cache/sfmapi-sdk
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - name: Install
        run: |
          uv sync --extra dev --extra mcp
          uv pip install -e "$SFMAPI_SDK_REPO/python"
          uv pip install -e "$SFMAPI_SDK_REPO/python/sfmapi_client_gen"
      - name: Ruff lint
        run: uv run ruff check app tests
      - name: Ruff format check
        run: uv run ruff format --check app tests

  test-sqlite:
    runs-on: ubuntu-latest
    env:
      SFMAPI_DB_URL: "sqlite+aiosqlite:///./test_sqlite.db"
      SFMAPI_AUTH_MODE: "none"
      SFMAPI_PYCOLMAP_AVAILABLE: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: SFMAPI/sfmapi-sdk
          path: .cache/sfmapi-sdk
      - uses: astral-sh/setup-uv@v7
      - name: Install
        run: |
          uv sync --extra dev --extra mcp
          uv pip install -e "$SFMAPI_SDK_REPO/python"
          uv pip install -e "$SFMAPI_SDK_REPO/python/sfmapi_client_gen"
      - name: Test (SQLite)
        run: uv run pytest -q -m "not needs_pycolmap and not needs_postgres"

  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sfm
          POSTGRES_PASSWORD: sfm
          POSTGRES_DB: sfmapi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sfm -d sfmapi_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      SFMAPI_DB_URL: "postgresql+psycopg://sfm:sfm@localhost:5432/sfmapi_test"
      SFMAPI_AUTH_MODE: "none"
      SFMAPI_PYCOLMAP_AVAILABLE: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: SFMAPI/sfmapi-sdk
          path: .cache/sfmapi-sdk
      - uses: astral-sh/setup-uv@v7
      - name: Install
        run: |
          uv sync --extra dev --extra mcp
          uv pip install -e "$SFMAPI_SDK_REPO/python"
          uv pip install -e "$SFMAPI_SDK_REPO/python/sfmapi_client_gen"
      - name: Wait for postgres
        run: |
          for i in {1..30}; do
            if uv run python -c "import psycopg; psycopg.connect('postgresql://sfm:sfm@localhost:5432/sfmapi_test')" 2>/dev/null; then
              echo "Postgres ready"; exit 0
            fi
            echo "Waiting for postgres... ($i)"; sleep 2
          done
          echo "Postgres never came up"; exit 1
      - name: Migrate
        run: uv run alembic upgrade head
      - name: Test (Postgres)
        run: uv run pytest -q -m "not needs_pycolmap"

  real-engine:
    # Manual-only (workflow_dispatch). Building COLMAP + pulling the
    # South Building sample is slow and runner-specific, so this lane
    # does NOT gate PRs — trigger it from the Actions tab when
    # validating engine-affecting changes. See
    # docs/guides/real_engine_testing.md. SKELETON: the COLMAP build
    # step is expected to be tuned per runner before this is relied on.
    name: real-engine (manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 90
    env:
      SFMAPI_DB_URL: "sqlite+aiosqlite:///./test_real_engine.db"
      SFMAPI_AUTH_MODE: "none"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: SFMAPI/sfmapi-sdk
          path: .cache/sfmapi-sdk
      - uses: astral-sh/setup-uv@v7
      - name: Install COLMAP
        # Placeholder: apt's colmap is often stale. For a hardened lane,
        # build from source or use a prebuilt image pinned to a known
        # version (see docs/guides/real_engine_testing.md).
        run: sudo apt-get update && sudo apt-get install -y colmap
      - name: Install sfmapi + a COLMAP backend
        run: |
          uv sync --extra dev --extra mcp
          uv pip install -e "$SFMAPI_SDK_REPO/python"
          uv pip install -e "$SFMAPI_SDK_REPO/python/sfmapi_client_gen"
          # A COLMAP-backed plugin lives in its own repo; install it
          # here so it auto-registers via its sfmapi.backends entry point.
          # uv pip install -e ../sfmapi_colmap_cli
      - name: Download South Building sample
        run: |
          mkdir -p .cache/samples
          # curl -L https://demuc.de/colmap/datasets/south-building.zip \
          #   -o .cache/samples/south-building.zip
          echo "TODO: wire the South Building fetch for the runner"
      - name: Test (real engine)
        run: uv run pytest -q -m "needs_pycolmap or needs_backend"

  smoke:
    name: smoke (compose stack)
    runs-on: ubuntu-latest
    needs: [lint]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Show docker version
        run: docker --version && docker compose version
      - name: Pre-pull base images
        run: |
          docker pull postgres:16-alpine &
          docker pull redis:7-alpine &
          wait
      - name: Run smoke
        env:
          # Use isolated host ports so this job can't collide with other
          # services on the runner. The script auto-passes these into compose.
          SFMAPI_WEB_PORT: "18080"
          SFMAPI_PG_PORT: "55432"
          SFMAPI_REDIS_PORT: "56379"
        run: bash scripts/smoke.sh
      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose -p sfmapi-smoke -f deploy/docker-compose.yml \
            logs --no-color --tail=200 || true
