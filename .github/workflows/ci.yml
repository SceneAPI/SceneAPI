name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SFMAPI_SDK_REPO: ${{ github.workspace }}/.cache/sfmapi-sdk

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: SFMAPI/sfmapi-sdk
          path: .cache/sfmapi-sdk
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - name: Install
        run: |
          uv sync --extra dev --extra mcp
          uv pip install -e "$SFMAPI_SDK_REPO/python"
          uv pip install -e "$SFMAPI_SDK_REPO/python/sfmapi_client_gen"
      - name: Ruff lint
        run: uv run ruff check sceneapi sfm_hub sfmapi tests scripts
      - name: Ruff format check
        run: uv run ruff format --check sceneapi sfm_hub sfmapi tests scripts

  test-sqlite:
    runs-on: ubuntu-latest
    env:
      SCENEAPI_DB_URL: "sqlite+aiosqlite:///./test_sqlite.db"
      SCENEAPI_AUTH_MODE: "none"
      SCENEAPI_PYCOLMAP_AVAILABLE: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: SFMAPI/sfmapi-sdk
          path: .cache/sfmapi-sdk
      - uses: astral-sh/setup-uv@v7
      - name: Install
        run: |
          uv sync --extra dev --extra mcp
          uv pip install -e "$SFMAPI_SDK_REPO/python"
          uv pip install -e "$SFMAPI_SDK_REPO/python/sfmapi_client_gen"
      - name: Test (SQLite)
        run: uv run pytest -q -m "not needs_postgres"

  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sfm
          POSTGRES_PASSWORD: sfm
          POSTGRES_DB: sfmapi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sfm -d sfmapi_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      SCENEAPI_DB_URL: "postgresql+psycopg://sfm:sfm@localhost:5432/sfmapi_test"
      SCENEAPI_AUTH_MODE: "none"
      SCENEAPI_PYCOLMAP_AVAILABLE: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: SFMAPI/sfmapi-sdk
          path: .cache/sfmapi-sdk
      - uses: astral-sh/setup-uv@v7
      - name: Install
        run: |
          uv sync --extra dev --extra mcp
          uv pip install -e "$SFMAPI_SDK_REPO/python"
          uv pip install -e "$SFMAPI_SDK_REPO/python/sfmapi_client_gen"
      - name: Wait for postgres
        run: |
          for i in {1..30}; do
            if uv run python -c "import psycopg; psycopg.connect('postgresql://sfm:sfm@localhost:5432/sfmapi_test')" 2>/dev/null; then
              echo "Postgres ready"; exit 0
            fi
            echo "Waiting for postgres... ($i)"; sleep 2
          done
          echo "Postgres never came up"; exit 1
      - name: Migrate
        run: uv run alembic upgrade head
      - name: Test (Postgres)
        run: uv run pytest -q

  smoke:
    name: smoke (compose stack)
    runs-on: ubuntu-latest
    needs: [lint]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Show docker version
        run: docker --version && docker compose version
      - name: Pre-pull base images
        run: |
          docker pull postgres:16-alpine &
          docker pull redis:7-alpine &
          wait
      - name: Run smoke
        env:
          # Use isolated host ports so this job can't collide with other
          # services on the runner. The script auto-passes these into compose.
          SCENEAPI_WEB_PORT: "18080"
          SCENEAPI_PG_PORT: "55432"
          SCENEAPI_REDIS_PORT: "56379"
        run: bash scripts/smoke.sh
      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose -p sfmapi-smoke -f deploy/docker-compose.yml \
            logs --no-color --tail=200 || true
