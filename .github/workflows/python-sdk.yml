name: Python SDK + CLI

on:
  push:
    branches: [main]
    paths:
      - "clients/python/**"
      - ".github/workflows/python-sdk.yml"
  pull_request:
    paths:
      - "clients/python/**"

permissions:
  contents: read

concurrency:
  group: python-sdk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: clients/python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install
        run: |
          uv venv --seed
          uv pip install -e ".[dev]"
      - name: Lint
        run: uv run ruff check sfmapi_client tests
      - name: Test
        run: uv run pytest -q
      - name: Verify CLI entrypoint installed
        run: uv run sfmapi --version
      - name: Build distribution
        run: |
          uv pip install build
          uv run python -m build --sdist --wheel
      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: sfmapi-client-py-dist
          path: clients/python/dist
          retention-days: 14
