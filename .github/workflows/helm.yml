name: Helm chart

on:
  push:
    branches: [main]
    paths:
      - "deploy/helm/**"
      - ".github/workflows/helm.yml"
  pull_request:
    paths:
      - "deploy/helm/**"

permissions:
  contents: read

concurrency:
  group: helm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-template:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v5
        with:
          # 3.16.0 hits a known OCI-subchart cleanup bug: `helm
          # dependency build` pulls bitnami charts then logs
          # "Deleting outdated charts" and empties charts/ before
          # `helm template` runs. Pinning past the fix.
          version: "v3.18.4"
      - name: Resolve subcharts (helm dependency update + expand)
        # `helm dependency update` lands the bitnami subcharts as
        # `.tgz` files and writes a Chart.lock referencing them.
        # Helm 3.18's chart loader cross-checks Chart.lock against
        # what's in `charts/`, so after we expand the .tgz files
        # to directory form we also drop Chart.lock — letting helm
        # walk `charts/` directly. (Chart.lock is regeneratable
        # and not committed.)
        run: |
          set -e
          helm dependency update deploy/helm/sfmapi
          cd deploy/helm/sfmapi/charts
          for f in *.tgz; do
            tar xzf "$f"
            rm "$f"
          done
          ls -la
          rm -f ../Chart.lock
          ls -la ../
      - name: helm lint
        run: helm lint deploy/helm/sfmapi
      - name: helm template (defaults)
        run: helm template ci-default deploy/helm/sfmapi --debug > /tmp/default.yaml
      - name: helm template (worker enabled)
        run: |
          helm template ci-worker deploy/helm/sfmapi --debug \
            --set worker.enabled=true \
            --set worker.image.repository=example.com/worker \
            --set worker.image.tag=test \
            --set web.ingress.enabled=true \
            --set web.autoscaling.enabled=true \
            > /tmp/worker.yaml
      - name: kubeval (best-effort)
        continue-on-error: true
        run: |
          set -e
          curl -L -o kubeval.tar.gz \
              https://github.com/instrumenta/kubeval/releases/download/v0.16.1/kubeval-linux-amd64.tar.gz
          tar xf kubeval.tar.gz
          ./kubeval --strict --skip-kinds CustomResourceDefinition /tmp/default.yaml
          ./kubeval --strict --skip-kinds CustomResourceDefinition /tmp/worker.yaml
      - name: Upload templates
        uses: actions/upload-artifact@v7
        with:
          name: helm-templates
          path: /tmp/*.yaml
          retention-days: 14
