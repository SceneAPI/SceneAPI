name: Helm chart

on:
  push:
    branches: [main]
    paths:
      - "deploy/helm/**"
      - ".github/workflows/helm.yml"
  pull_request:
    paths:
      - "deploy/helm/**"

permissions:
  contents: read

concurrency:
  group: helm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-template:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v5
        with:
          version: "v3.16.0"
      - name: Resolve subcharts (helm pull)
        # Bitnami's HTTPS chart repo redirects to OCI at registry-1
        # .docker.io/bitnamicharts; `helm dependency update` pulls
        # but doesn't always drop the .tgz into the local `charts/`
        # dir on 3.14+. Pulling the OCI charts explicitly into
        # `charts/` is the reliable workaround.
        run: |
          set -e
          mkdir -p deploy/helm/sfmapi/charts
          # Versions tracked here — bump alongside Chart.yaml's
          # version range. Renovate's helm datasource keeps these
          # honest.
          helm pull oci://registry-1.docker.io/bitnamicharts/postgresql \
              --version 16.7.27 \
              -d deploy/helm/sfmapi/charts
          helm pull oci://registry-1.docker.io/bitnamicharts/redis \
              --version 21.2.14 \
              -d deploy/helm/sfmapi/charts
          ls -la deploy/helm/sfmapi/charts
      - name: helm lint
        run: helm lint deploy/helm/sfmapi
      - name: helm template (defaults)
        run: helm template ci-default deploy/helm/sfmapi --debug > /tmp/default.yaml
      - name: helm template (worker enabled)
        run: |
          helm template ci-worker deploy/helm/sfmapi --debug \
            --set worker.enabled=true \
            --set worker.image.repository=example.com/worker \
            --set worker.image.tag=test \
            --set web.ingress.enabled=true \
            --set web.autoscaling.enabled=true \
            > /tmp/worker.yaml
      - name: kubeval (best-effort)
        continue-on-error: true
        run: |
          set -e
          curl -L -o kubeval.tar.gz \
              https://github.com/instrumenta/kubeval/releases/download/v0.16.1/kubeval-linux-amd64.tar.gz
          tar xf kubeval.tar.gz
          ./kubeval --strict --skip-kinds CustomResourceDefinition /tmp/default.yaml
          ./kubeval --strict --skip-kinds CustomResourceDefinition /tmp/worker.yaml
      - name: Upload templates
        uses: actions/upload-artifact@v7
        with:
          name: helm-templates
          path: /tmp/*.yaml
          retention-days: 14
