name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "sceneapi/**"
      - "sfmapi/**"
      - "sfm_hub/**"
      - ".readthedocs.yaml"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - ".readthedocs.yaml"
  # Allow manual re-publish from the Actions tab.
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

env:
  SFMAPI_SDK_REPO: ${{ github.workspace }}/.cache/sfmapi-sdk

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/checkout@v7
        with:
          repository: SceneAPI/SceneSDK
          path: .cache/sfmapi-sdk
      - uses: actions/checkout@v7
        with:
          repository: SceneAPI/SceneIO
          path: .cache/SceneIO
      - name: Link the sceneio contract plane to the sibling path uv.sources expects
        run: ln -s "$GITHUB_WORKSPACE/.cache/SceneIO" "$GITHUB_WORKSPACE/../SceneIO"
      - uses: astral-sh/setup-uv@v7
      - name: Install
        run: |
          uv venv
          uv pip install -e .
          uv pip install -e "$SFMAPI_SDK_REPO/python"
          uv pip install -e "$SFMAPI_SDK_REPO/python/scenesdk"
          uv pip install -r docs/requirements.txt
      - name: Sphinx build (warning -> error)
        run: |
          uv run sphinx-build -b html -W --keep-going docs docs/_build/html
      - name: Upload built site (PR previews + retention)
        uses: actions/upload-artifact@v7
        with:
          name: docs-html
          path: docs/_build/html
          retention-days: 14

  deploy:
    # Push the strict-built site to the org-pages repo on every main
    # push. Skipped on PRs (no secrets) and when the deploy token is
    # absent (graceful no-op until the destination repo + PAT are
    # provisioned).
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Bail early if deploy key isn't configured
        id: gate
        env:
          DEPLOY_KEY: ${{ secrets.ACTIONS_DEPLOY_KEY }}
        run: |
          if [ -z "$DEPLOY_KEY" ]; then
            echo "ACTIONS_DEPLOY_KEY not set; skipping deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Download built site
        if: steps.gate.outputs.skip != 'true'
        uses: actions/download-artifact@v8
        with:
          name: docs-html
          path: site
      - name: Push to sfmapi/sfmapi.github.io
        if: steps.gate.outputs.skip != 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          # SSH deploy key registered on sfmapi/sfmapi.github.io
          # (write access). The matching public half lives at that
          # repo's Settings -> Deploy keys.
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          external_repository: sfmapi/sfmapi.github.io
          publish_branch: main
          publish_dir: ./site
          # Don't keep .git history on the destination — every push
          # is a clean snapshot so the pages repo stays tiny.
          force_orphan: true
          # Sphinx already emits a `_static/` tree; Jekyll would treat
          # the leading underscore as a hidden directory and drop it.
          enable_jekyll: false
          commit_message: "docs: deploy ${{ github.sha }}"
