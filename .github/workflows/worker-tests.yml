# Worker-side tests against the *real* colmap_mod pycolmap.
#
# Runs on a self-hosted runner labeled `gpu-cuda` that has:
#   - The colmap_mod source checked out under $COLMAP_MOD_DIR (default
#     ../colmap_mod relative to this repo).
#   - CUDA toolkit + cuDSS installed at the versions the wheel expects.
#   - `uv` and Python 3.12 on PATH.
#
# To install a self-hosted runner with that label:
#   Settings -> Actions -> Runners -> New self-hosted runner -> add
#   the labels [self-hosted, gpu-cuda, windows]  (or  linux).
#
# Trigger:
#   - manual (workflow_dispatch)
#   - on a tag (release-side validation that real GPU still passes)
#   - nightly schedule, so drift in colmap_mod is caught
#
# Secrets / vars used:
#   COLMAP_MOD_REF: branch/sha of colmap_mod to build against (env var
#                   on the runner; falls back to "main").
#
# This workflow is OPTIONAL: the rest of CI runs against any standard
# ubuntu-latest, with `pycolmap not available` skips. This job is what
# turns those skips into real assertions on a CUDA host.

name: Worker tests (real pycolmap)

on:
  workflow_dispatch:
    inputs:
      colmap_ref:
        description: "colmap_mod git ref to build (branch / tag / sha). Default: main."
        required: false
        default: "main"  # renovate: depName=opsiclear/colmap_mod datasource=github-tags
  pull_request:
    paths:
      - ".github/workflows/worker-tests.yml"
  push:
    tags:
      - "v*.*.*"
  schedule:
    - cron: "0 8 * * *"   # 08:00 UTC nightly

permissions:
  contents: read

concurrency:
  group: worker-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build pycolmap + run needs_pycolmap suite
    runs-on: [self-hosted, gpu-cuda]
    timeout-minutes: 120
    env:
      SFMAPI_PYCOLMAP_AVAILABLE: "true"
      SFMAPI_AUTH_MODE: "none"
      SFMAPI_DB_URL: "sqlite+aiosqlite:///./test_worker.db"
      SFMAPI_INLINE_TASKS: "true"
      CMAKE_GENERATOR: "Ninja"
    steps:
      - name: Checkout sfmapi
        uses: actions/checkout@v4
        with:
          path: sfmapi

      - name: Resolve colmap_mod ref
        id: ref
        shell: bash
        run: |
          REF="${{ github.event.inputs.colmap_ref || env.COLMAP_MOD_REF || 'main' }}"
          echo "colmap_ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Checkout colmap_mod
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/colmap_mod
          ref: ${{ steps.ref.outputs.colmap_ref }}
          path: colmap_mod
          submodules: recursive
          fetch-depth: 1

      - name: Probe CUDA toolchain
        shell: bash
        run: |
          set -euo pipefail
          (nvcc --version || true)
          (nvidia-smi || true)
          uv --version
          python --version

      - name: Build & install pycolmap wheel into a fresh venv
        shell: bash
        working-directory: sfmapi
        run: |
          set -euo pipefail
          uv venv --seed
          # Install sfmapi (web layer + dev deps) first so the lockfile
          # is consistent before we pip-install the heavy native wheel.
          uv pip install -e ".[dev]"
          # Build + install pycolmap (no isolation so it sees the venv's
          # numpy/nanobind picks).
          uv pip install -e "../colmap_mod" --no-build-isolation -v

      - name: Probe pycolmap is importable
        shell: bash
        working-directory: sfmapi
        run: |
          set -euo pipefail
          uv run python -c "import pycolmap, sys; print('pycolmap', getattr(pycolmap, '__version__', 'n/a'), 'from', pycolmap.__file__)"

      - name: Capture runtime version vector
        id: rv
        shell: bash
        working-directory: sfmapi
        run: |
          set -euo pipefail
          COLMAP_SHA=$(git -C ../colmap_mod rev-parse HEAD)
          BAXX_SHA=$(git -C ../colmap_mod rev-parse HEAD:third_party/baxx 2>/dev/null || echo "unknown")
          echo "colmap_sha=$COLMAP_SHA" >> "$GITHUB_OUTPUT"
          echo "baxx_sha=$BAXX_SHA" >> "$GITHUB_OUTPUT"

      - name: Migrate
        shell: bash
        working-directory: sfmapi
        run: uv run alembic upgrade head

      - name: Run needs_pycolmap tests
        shell: bash
        working-directory: sfmapi
        env:
          SFMAPI_COLMAP_SHA: ${{ steps.rv.outputs.colmap_sha }}
          SFMAPI_BAXX_SHA: ${{ steps.rv.outputs.baxx_sha }}
        run: |
          set -euo pipefail
          # Run the gated set explicitly, plus the full default suite to
          # ensure no regression on the inline path.
          uv run pytest -q -m "needs_pycolmap" --maxfail=3
          uv run pytest -q -m "not needs_pycolmap and not needs_postgres"

      - name: Upload pytest output on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-output-${{ github.run_id }}
          path: |
            sfmapi/.pytest_cache
            sfmapi/test_worker.db
          if-no-files-found: ignore
          retention-days: 7
