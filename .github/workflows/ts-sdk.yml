name: TS SDK

on:
  push:
    branches: [main]
    paths:
      - "clients/typescript/**"
      - "app/**"
      - "scripts/dump_openapi.py"
      - ".github/workflows/ts-sdk.yml"
  pull_request:
    paths:
      - "clients/typescript/**"
      - "app/**"
      - "scripts/dump_openapi.py"

permissions:
  contents: read

concurrency:
  group: ts-sdk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: clients/typescript/package-lock.json
      - name: Install python (for OpenAPI dump)
        run: uv sync --extra dev
      - name: Dump OpenAPI document
        run: uv run python scripts/dump_openapi.py --out docs/_static/openapi.json --indent 2
      - name: Install (TS deps)
        working-directory: clients/typescript
        run: npm ci || npm install
      - name: Generate openapi-types.ts
        working-directory: clients/typescript
        run: npm run gen:openapi-types
      - name: Drift check (hand-rolled models vs generated schemas)
        working-directory: clients/typescript
        run: npm run check:openapi-drift
      - name: Typecheck
        working-directory: clients/typescript
        run: npx tsc --noEmit
      - name: Test
        working-directory: clients/typescript
        run: npm test
      - name: Build (ESM + CJS + .d.ts)
        working-directory: clients/typescript
        run: npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: sfmapi-client-ts-dist
          path: clients/typescript/dist
          retention-days: 14
