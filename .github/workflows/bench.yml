name: Bench (real GPU)

on:
  workflow_dispatch:
    inputs:
      datasets:
        description: "Dataset names to run (space-separated). Empty = all."
        required: false
        default: ""
  # Schedule disabled: bench needs a self-hosted GPU runner with a
  # registered backend installed. Re-enable once an operator wires
  # up a runner with the backend package they want to track.
  # schedule:
  #   - cron: "0 9 * * *"   # 09:00 UTC nightly

permissions:
  contents: write   # allow committing results back to bench-results branch

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run:
    runs-on: [self-hosted, gpu-cuda]
    timeout-minutes: 240
    env:
      SCENEAPI_BASE_URL: "http://localhost:8080"
      SFMAPI_SDK_REPO: ${{ github.workspace }}/.cache/sfmapi-sdk
      # The backend that will execute the bench is whatever's
      # registered on the runner. Set SCENEAPI_BACKEND to its name.
      SCENEAPI_BACKEND: "${{ vars.SCENEAPI_BENCH_BACKEND || 'colmap_mod' }}"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/checkout@v7
        with:
          repository: SceneAPI/SceneSDK
          path: .cache/sfmapi-sdk
      - uses: actions/checkout@v7
        with:
          repository: SceneAPI/SceneIO
          path: .cache/SceneIO
      - name: Link the sceneio contract plane to the sibling path uv.sources expects
        # -sfn: this runner is self-hosted (persistent workspace), so a
        # ../SceneIO symlink may already exist from a prior run.
        run: ln -sfn "$GITHUB_WORKSPACE/.cache/SceneIO" "$GITHUB_WORKSPACE/../SceneIO"
      - uses: astral-sh/setup-uv@v7
      - name: Install
        run: |
          uv venv --seed
          uv pip install -e ".[dev]"
          uv pip install -e "$SFMAPI_SDK_REPO/python"
          uv pip install pyyaml click
      - name: Bring up server stack (compose)
        run: |
          bash scripts/smoke.sh --keep   # leaves stack up after smoke
      - name: Run benches
        env:
          DATASETS: ${{ github.event.inputs.datasets }}
        run: |
          if [ -z "$DATASETS" ]; then
            uv run python -m bench.cli run --all
          else
            FLAGS=""
            for d in $DATASETS; do
              FLAGS="$FLAGS --dataset $d"
            done
            uv run python -m bench.cli run $FLAGS
          fi
      - name: Lint regressions
        run: uv run python -m bench.cli lint
      - name: Commit results
        if: success()
        run: |
          git config user.name  "scenebench"
          git config user.email "bench@sfmapi.github.io"
          git checkout -B bench-results
          git add bench/results
          if git diff --cached --quiet; then
            echo "no new results"
            exit 0
          fi
          git commit -m "bench: results for ${{ github.sha }}"
          git push -f origin bench-results
      - name: Tear down compose
        if: always()
        run: |
          docker compose -p sfmapi-smoke -f deploy/docker-compose.yml down -v || true
